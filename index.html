<head>

<title>MOPs Enablement Agent — Veeam</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans','Segoe UI',sans-serif;background:linear-gradient(160deg,#070d0a 0%,#0c1510 60%,#080e0b 100%);color:#e2ede6;min-height:100vh}
#app{max-width:780px;margin:0 auto;padding:1.5rem 1rem 2rem}
#header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid rgba(0,162,120,0.18)}
#header-left{display:flex;align-items:center;gap:14px}
.icon-wrap{width:48px;height:48px;border-radius:13px;background:#070d0a;border:1px solid rgba(0,162,120,0.35);box-shadow:0 0 24px rgba(0,162,120,0.3);flex-shrink:0;overflow:hidden;padding:6px}
.header-title{font-weight:700;font-size:18px;letter-spacing:-0.4px;color:#edf5f0;line-height:1.2}
.header-sub{font-size:11.5px;margin-top:3px;color:#00c896;font-weight:500;letter-spacing:0.2px;display:flex;align-items:center;gap:7px}
.live-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#00c896;box-shadow:0 0 8px #00c896;animation:pulse 2s infinite}
#reset-btn{font-size:12px;font-weight:600;color:#5a9e78;background:rgba(0,162,120,0.08);border:1px solid rgba(0,162,120,0.22);border-radius:9px;padding:6px 14px;cursor:pointer;transition:all 0.15s;letter-spacing:0.3px;display:none}
#reset-btn:hover{background:rgba(0,162,120,0.16);color:#00d4a0}
#suggestions{margin-bottom:24px}
.sq-label{font-size:10.5px;font-weight:700;letter-spacing:1.2px;color:#3d6e52;text-transform:uppercase;margin-bottom:12px}
#sq-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:8px}
.sq-btn{padding:10px 13px;background:rgba(255,255,255,0.025);border:1px solid rgba(0,162,120,0.16);border-radius:11px;font-size:12.5px;font-weight:500;color:#8fc4a4;cursor:pointer;text-align:left;transition:all 0.18s;line-height:1.3;font-family:'DM Sans','Segoe UI',sans-serif}
.sq-btn:hover{background:rgba(0,162,120,0.1);border-color:rgba(0,200,140,0.45);color:#00d4a0;transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,162,120,0.15)}
#chat-area{border:1px solid rgba(0,162,120,0.14);border-radius:18px;overflow:hidden;margin-bottom:14px;background:rgba(255,255,255,0.018)}
#messages{max-height:460px;overflow-y:auto;padding:22px 20px 12px}
#messages::-webkit-scrollbar{width:4px}
#messages::-webkit-scrollbar-track{background:transparent}
#messages::-webkit-scrollbar-thumb{background:rgba(0,162,120,0.22);border-radius:4px}
.msg-row{display:flex;gap:12px;margin-bottom:20px;align-items:flex-start}
.msg-row.user{flex-direction:row-reverse}
.avatar-user{width:33px;height:33px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;letter-spacing:0.5px;background:linear-gradient(135deg,#1a3aff 0%,#6b7fff 100%);color:white;box-shadow:0 0 14px rgba(26,58,255,0.4)}
.avatar-agent{width:33px;height:33px;border-radius:11px;background:#070d0a;border:1px solid rgba(0,162,120,0.35);box-shadow:0 0 14px rgba(0,162,120,0.3);flex-shrink:0;overflow:hidden;padding:5px}
.bubble{max-width:80%;padding:13px 17px;font-size:13.5px;line-height:1.72;white-space:pre-wrap}
.bubble.user{border-radius:16px 4px 16px 16px;background:linear-gradient(135deg,#0f2060 0%,#162878 100%);color:#b8ccff;border:1px solid rgba(100,130,255,0.28);box-shadow:0 6px 24px rgba(26,58,255,0.14)}
.bubble.agent{border-radius:4px 16px 16px 16px;background:rgba(255,255,255,0.045);color:#d5ebe0;border:1px solid rgba(0,162,120,0.14);box-shadow:0 4px 20px rgba(0,0,0,0.22)}
.feedback-area{margin-top:12px;padding-top:10px;border-top:1px solid rgba(0,162,120,0.1)}
.feedback-row{display:flex;gap:6px;align-items:center}
.fb-label{font-size:10px;color:#3d6e52;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;margin-right:2px}
.fb-btn{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:7px;padding:3px 10px;cursor:pointer;font-size:13px;color:#4a7060;transition:all 0.15s}
.fb-btn.up-active{background:rgba(0,162,120,0.22);border-color:rgba(0,210,150,0.6);color:#00d4a0}
.fb-btn.down-active{background:rgba(255,70,70,0.14);border-color:rgba(255,100,100,0.5);color:#ff7070}
.thanks{font-size:11px;margin-left:4px;font-weight:500;color:#00d4a0}
.reason-area{margin-top:10px}
.reason-label{font-size:11px;color:#7aaa8e;margin-bottom:7px;font-weight:600;letter-spacing:0.5px}
.reason-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.reason-chip{font-size:11.5px;padding:5px 12px;border-radius:20px;cursor:pointer;transition:all 0.15s;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.04);color:#6a9a7e;font-family:'DM Sans','Segoe UI',sans-serif}
.reason-chip.selected{border-color:rgba(255,100,100,0.6);background:rgba(255,70,70,0.18);color:#ff8888;font-weight:600}
.submit-fb-btn{font-size:12px;padding:6px 16px;border-radius:8px;border:1px solid rgba(255,100,100,0.3);background:rgba(255,255,255,0.03);color:#3d5045;font-weight:600;transition:all 0.15s;cursor:not-allowed;font-family:'DM Sans','Segoe UI',sans-serif}
.submit-fb-btn.ready{background:rgba(255,70,70,0.15);color:#ff8888;cursor:pointer}
.submitted-msg{font-size:12px;color:#7aaa8e;font-weight:500;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ticket-link{font-size:11px;font-weight:700;color:#00c896;background:rgba(0,162,120,0.12);border:1px solid rgba(0,200,140,0.3);border-radius:6px;padding:2px 9px;text-decoration:none;letter-spacing:0.3px;transition:all 0.15s}
.ticket-link:hover{background:rgba(0,162,120,0.22);border-color:rgba(0,200,140,0.6)}
#loading-row{display:none;gap:12px;margin-bottom:20px;align-items:flex-start}
.dots{padding:14px 18px;background:rgba(255,255,255,0.045);border:1px solid rgba(0,162,120,0.14);border-radius:4px 16px 16px 16px;display:flex;gap:6px;align-items:center}
.dot{width:7px;height:7px;border-radius:50%;background:#00A278;box-shadow:0 0 6px rgba(0,162,120,0.6)}
.dot:nth-child(1){animation:bounce 1.2s 0s infinite}
.dot:nth-child(2){animation:bounce 1.2s 0.18s infinite}
.dot:nth-child(3){animation:bounce 1.2s 0.36s infinite}
#followup-chips{padding:8px 20px 16px;display:flex;flex-wrap:wrap;gap:6px;border-top:1px solid rgba(0,162,120,0.07)}
.fup-chip{padding:4px 12px;border:1px solid rgba(0,162,120,0.18);border-radius:20px;font-size:11.5px;font-weight:500;color:#5a9e78;background:rgba(0,162,120,0.05);cursor:pointer;transition:all 0.15s;font-family:'DM Sans','Segoe UI',sans-serif}
.fup-chip:hover{background:rgba(0,162,120,0.12);color:#00d4a0;border-color:rgba(0,200,140,0.4)}
#input-bar{display:flex;gap:10px;border:1px solid rgba(0,162,120,0.2);border-radius:15px;padding:10px 10px 10px 18px;background:rgba(255,255,255,0.028);box-shadow:0 4px 24px rgba(0,0,0,0.25);transition:all 0.2s}
#input-bar.focused{border-color:rgba(0,162,120,0.55);box-shadow:0 0 0 3px rgba(0,162,120,0.1),0 8px 32px rgba(0,0,0,0.35)}
#input{flex:1;border:none;outline:none;font-size:14px;background:transparent;color:#dff0e6;font-family:'DM Sans','Segoe UI',sans-serif;letter-spacing:0.1px}
#send-btn{padding:9px 22px;background:rgba(255,255,255,0.05);color:#2e5040;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:not-allowed;transition:all 0.2s;flex-shrink:0;letter-spacing:0.4px;font-family:'DM Sans','Segoe UI',sans-serif}
#send-btn.ready{background:linear-gradient(135deg,#00A278 0%,#00d4a0 100%);color:white;cursor:pointer;box-shadow:0 0 20px rgba(0,162,120,0.45)}
#footer{font-size:11px;color:#243d2e;margin-top:10px;text-align:center;letter-spacing:0.2px}
@keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:0.55}40%{transform:translateY(-7px);opacity:1}}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 8px #00c896}50%{opacity:0.4;box-shadow:0 0 3px #00c896}}
</style>
</head>

<div id="app">
  <div id="header">
    <div id="header-left">
      <div class="icon-wrap">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
          <circle cx="3" cy="33" r="1.5" fill="#00A278" fill-opacity="0.2"/><circle cx="9" cy="33" r="1.5" fill="#00A278" fill-opacity="0.2"/><circle cx="15" cy="33" r="1.5" fill="#00A278" fill-opacity="0.2"/><circle cx="21" cy="33" r="1.5" fill="#00A278" fill-opacity="0.2"/><circle cx="27" cy="33" r="1.5" fill="#00A278" fill-opacity="0.2"/><circle cx="33" cy="33" r="1.5" fill="#00A278" fill-opacity="0.2"/>
          <circle cx="3" cy="27" r="1.5" fill="#00A278" fill-opacity="0.25"/><circle cx="9" cy="27" r="1.5" fill="#00A278" fill-opacity="0.3"/><circle cx="15" cy="27" r="1.5" fill="#00A278" fill-opacity="0.38"/><circle cx="21" cy="27" r="1.5" fill="#00A278" fill-opacity="0.45"/><circle cx="27" cy="27" r="2" fill="#00c896" fill-opacity="0.6"/><circle cx="33" cy="27" r="2" fill="#00c896" fill-opacity="0.75"/>
          <circle cx="3" cy="21" r="1.5" fill="#00A278" fill-opacity="0.25"/><circle cx="9" cy="21" r="1.5" fill="#00A278" fill-opacity="0.32"/><circle cx="15" cy="21" r="2" fill="#00c896" fill-opacity="0.5"/><circle cx="21" cy="21" r="2" fill="#00c896" fill-opacity="0.68"/><circle cx="27" cy="21" r="2.5" fill="#00c896"/><circle cx="33" cy="21" r="2.5" fill="#00d4a0"/>

          <circle cx="21" cy="3" r="2" fill="#00d4a0" fill-opacity="0.7"/><circle cx="27" cy="3" r="2.5" fill="#00d4a0"/><circle cx="33" cy="3" r="3" fill="white"/>

      <div id="loading-row">
        <div class="avatar-agent"><svg width="23" height="23" viewBox="0 0 36 36" fill="none"><circle cx="3" cy="33" r="1.5" fill="#00A278" fill-opacity="0.2"/><circle cx="15" cy="21" r="2" fill="#00c896" fill-opacity="0.5"/><circle cx="27" cy="9" r="3" fill="#00d4a0"/><circle cx="33" cy="3" r="3" fill="white"/><polyline points="3,33 15,21 27,9 33,3" fill="none" stroke="#00d4a0" stroke-width="0.75" stroke-opacity="0.35" stroke-dasharray="2 2"/></svg></div>

<script>
const DECK_KNOWLEDGE = "You are the MOPs Enablement Agent for Veeam's Marketing Operations team. Answer questions based on the MOPs Master Deck and Confluence pages below. Be concise, helpful and specific \u2014 cite slide numbers or Confluence page titles where relevant. If something isn't covered in any source, say so clearly.\n\nIMPORTANT FORMATTING RULE: Never use markdown. No asterisks for bold, no # headers, no hyphens or dashes for bullet points. Write in plain text only. For lists, use numbers (1. 2. 3.) or plain sentences.\n\nWhen you draw on a Confluence page, mention the page name at the end of your answer, e.g. \"Source: Confluence \u2014 Engagement Scoring\".\n\n=== DECK CONTENT (107 slides) ===\n\nSLIDE 1 \u2014 Title: Marketing Operations Enablement Deck\n\nSLIDE 2 \u2014 Agenda: MOPs Org, Guide, Planning & Forecasting, Logic, Attribution, Reports, Budget, Campaign Set Up, Web & Google Analytics\n\nSLIDE 3 \u2014 3 Key Priorities:\nMarketing Operations exists to ensure every marketing dollar, campaign, and signal generates predictable, measurable pipeline. Three priorities:\n1. Deliver Actionable Insights \u2014 Enable Marketing, Product & SDR teams with timely, data-driven decision support\n2. Future-Proof Our MarTech & Data Foundation \u2014 Accelerate data journey to drive greater personalisation, automation, and AI adoption\n3. Strengthen Cross-Functional Execution \u2014 Improve coordination, planning, and delivery across Operations, Marketing, SDR, Sales, and Finance\n\nSLIDE 4 \u2014 Role Framework:\nBusiness Partners: Own business alignment & value realization. Define business priorities & success metrics. Translate business needs into analytical requirements. Drive adoption of tools and dashboards. Deliver actionable insights & recommendations. Track actions and measure impact.\nProgram Manager: Own process design & delivery governance. Design and optimise end-to-end processes. Define and document requirements. Own scoring methodologies. Deliver dashboard initiatives. Ensure data validation & quality. Build enablement materials.\nPlatform Ops Manager: Own data & reporting infrastructure. Build datasets and required business logic. Ensure data integrity and governance. Develop scalable dashboards. Enable self-service reporting.\n\nSLIDE 5 \u2014 Org Chart:\nJB Vermersch leads. Business Partners: Hoontae Sim (AMER), Janet Yap (APJ), Reece White (EMEA), Susan Ahn (Product), Julie Yap (SDR), TBH. Program Managers: Shreya Goel, Omar Barreiro, Kevin Arroyo, Alexandru Budur, Mei Pan, Ricardo Flores, Kenneth Ng, Nishanth Ramesh (Verticurl), Sowmya HS (Verticurl), Preethi Murugesan (Verticurl), Swathi Nayak, Arav Manchanda, Ashok Reddy Patil (Verticurl), Liyakhath Ali Khan (Verticurl). Platform Ops: Colin Eason, Harbinder Mann, Kate Shakhbazyan.\n\nSLIDE 6 \u2014 Resources:\nSharePoint: MOPs team site hosting enablement materials, process documentation, and shared datasets. Marketing Operations Shared Folder on the Veeam Marketing SharePoint.\nConfluence: Detailed process documentation, how-to guides, and system-specific instructions. Primary source of truth for operational procedures. Navigate to the Global Marketing Operations & Analytics space.\nTableau Reports: Marketing performance dashboards including the CMO Scorecard, Budget vs Spend, and Pipeline dashboards. Access via https://bi.veeam.com/views/MarketingDashboardNavigation/Navigation (VPN required).\nPower BI Reports: Supplementary reporting for paid media and MBM budget data. Integrated with MBM and Vertica data sources.\nMBM (Marketing Budget Management): In-house budget management tool for annual planning, quarterly reforecast, and spend tracking. Access at https://mbm.veeam.com (VPN + Chrome/Firefox required).\nCoupa: Procurement system for raising Purchase Requisitions (PRs) for all marketing vendor spend. Required for any external vendor engagement. See Coupa PR Creation Tips on Confluence.\nSalesforce (SFDC): CRM platform for campaign creation, lead management, pipeline tracking, and sponsorship recording. All campaign members, signals, and opportunity data live here.\nMarketo Measure Ultimate (MMU): Attribution platform that captures all online and offline marketing touchpoints and connects them to pipeline. Source of truth for multi-touch attribution data.\nJIRA (AEM Project): Ticketing system for MOPs requests including budget changes, data issues, and process support. Raise tickets at https://tracker.veeam.com/projects/AEM/summary\nVeeam ServiceDesk: Used for list import requests.\n\nSLIDE 7 \u2014 Section divider: New Joiner Onboarding Guide\n\nSLIDE 8 \u2014 Onboarding Guide (New to MOPs? Start Here):\nWork through the deck in this order \u2014 structure first, then systems, then processes.\nWeek 1 \u2014 Orientation: Read Slide 4 (MOPs Role Framework), Slide 5 (Org Chart \u2014 who is who), Slide 6 (Resources \u2014 bookmark every link and request access), Glossary (familiarise with all acronyms). Action: Request access to Tableau, MBM, Coupa, JIRA AEM, Salesforce & Confluence.\nWeek 2 \u2014 Understanding Pipeline: Read Slides 8-9 (GTM Framework & Planning overview), Slides 35-39 (Pipeline Logic \u2014 how Veeam defines pipeline), Slides 41-46 (Attribution \u2014 how credit is assigned), Slides 48-53 (Dashboards \u2014 navigate the CMO Scorecard). Action: Open Tableau and locate your region's pipeline view.\nWeek 3 \u2014 Forecasting & Ops: Read Slides 10-26 (Full Forecasting \u2014 Regional, Paid, Free, Prospecting), Slides 30-33 (Lead Scoring \u2014 how leads are scored & qualified), Slides 55-88 (Budget Management \u2014 MBM, Coupa, Reforecast). Action: Sit in on the next forecasting cycle with your manager.\nWeek 4 \u2014 Campaign & Web: Read Slides 89-93 (Campaign Creation \u2014 set up SF campaigns correctly), Slides 94-99 (Web Analytics \u2014 GA4 measurement & reporting). Action: Create a test campaign in Salesforce sandbox with all mandatory fields.\nNote: For role-specific onboarding (Business Partner / Program Manager / Platform Ops), ask your manager for a supplementary role guide.\n\nSLIDE 9 \u2014 Section divider: Planning & Forecasting\n\nSLIDE 10 \u2014 2026 GTM Framework:\nMotions: Acquisition (new solutions to prospects and customers), Retention (customer lifecycle), Expansion (expand solutions to install base), Cross-Sell/Migration (sell compatible value-add solutions to install base), Partner (Recruit, Activate, Grow, Retain), Brand Awareness (capturing hearts & minds of prospective buyers, driving brand preference for Veeam).\nGoDos (T2 themes): Cyber Resilience in the Age of Identity Threats (Hero: VDC), End-to-End Cyber Strategy for Multi-cloud (Hero: VDP/Vault/VCS), Accelerate Modern Apps & AI Adoption with Confidence (Hero: VDP/Kasten/Vault), Unifying Data Security Privacy and AI Governance (Hero: DSPM/Securiti AI), Cover Your SaaS (Hero: VDC Bundles), Effortless Data Protection (Hero: VDP/Vault).\nCustomer lifecycle (Retention): Onboarding, Adoption, Renewals, Engagement.\nABM: Veeam $100K+ ABM targeting high-value customer accounts. Solutions: Data/Security/AI. Product X-Sell (targeted solutions based on current install). Product Migration (accelerate migration from old to new based on customer value attained).\nSegments: Enterprise (ENT/COM named), Velocity (COM-inside/VEL).\n\nSLIDE 11 \u2014 Planning & Forecasting purpose:\nGives Visibility: provides a single, shared view of the Marketing & SDR plan, showing how campaigns translate into pipeline over time.\nCreates Accountability: clearly defines Marketing and SDR ownership for pipeline contribution and how success is measured.\nIdentifies Gaps Early: surfaces pipeline shortfalls and pacing risk early enough to take corrective action within the quarter.\nDrives Smarter Budget Allocation: ensures spend is prioritised toward highest-return programs and segments.\nImproves Cross-Functional Alignment: aligns Marketing, SDR, Sales, and Finance around one set of assumptions and forecasts.\nBuilds Executive Confidence: gives leadership a clear, data-backed view of performance, risk, and expected outcomes.\n\nSLIDE 12 \u2014 4 Forecast Components:\n1. Free \u2014 ML forecast (Prophet + XGBoost)\n2. Paid \u2014 Budget x ROAS (created using historical ROAS and 2026 budget)\n3. Regional \u2014 Expected Pipeline (created using historical pipeline)\n4. SDR Prospecting \u2014 X% of Target\n\nSLIDE 13 \u2014 SF Campaign Key Forecasting Inputs:\nFor a Salesforce campaign to feed into the Marketing & SDR pipeline forecast, the following fields must be accurately populated at campaign creation. Missing or incorrect values break the forecast chain.\nCampaign Type & Sub-Type: Determines whether the campaign feeds into Paid, Free, or Regional forecast bucket. Owner: Campaign Owner.\nGlobal Campaign-Program (GoDo): Maps the campaign to a T2-level GoDo for forecast allocation by product and sales coverage. Owner: Campaign Owner.\nTier 1/Tier 2/Tier 3/Tier 4: Regional and segment identifiers \u2014 essential for distributing forecasted pipeline to correct region/segment. Owner: Campaign Owner.\nSegment: Used to split forecast between ENT, COM, and VEL. Owner: Campaign Owner.\nStart Date/End Date: Defines the execution window used to calculate daily pipeline generation and apply Signal-to-GC lead times. Owner: Campaign Owner.\nExpected Cost USD: Input for Paid forecast. Owner: Campaign Owner.\nExpected GC Pipeline USD: Input for Regional forecast. Expected Pipeline used in daily pipeline and quarterly distribution calculations. Owner: Campaign Owner.\n\nSLIDE 15 \u2014 GoDo Campaign Level to Product and Sales Coverage:\nGoDos map campaign activity to specific product heroes and sales coverage areas. Each GoDo aligns to a T2 theme, a product hero (e.g. VDC, VDP, Kasten), a sales motion (Acquisition, Retention, Expansion etc.), and a target segment (ENT, COM, VEL). This mapping ensures forecast pipeline is allocated correctly to the right product and sales team.\n\nSLIDE 16 \u2014 Section divider: Regional Forecast\n\nSLIDES 17-18 \u2014 Regional Forecast (4 steps):\n1. Define Daily Pipeline: Active Days = End Date minus Start Date. Daily Pipeline = Expected Pipeline divided by Active Days. Output: Required daily pipeline generation.\n2. Apply Signal to GC Time: Use historical Signal to GC lead time. Apply regional & GTM lead time assumptions. Output: Expected GC creation timing.\n3. Determine Impact: Map GC timing to impacted quarters. Adjust for timing distribution. Output: Quarterly pipeline distribution.\n4. Allocate Pipeline: Pro-rate expected pipeline over time. Allocate by region/segment/product. Output: Regional Forecast.\nExample (UK/Irl Cold Call): Campaign Type: Cold Call Named Accounts. Region: EMEA UK/Ireland. Execution: Jan-Dec 2026. Expected Pipeline: $100K. Lead Time Signal to GC: 54 days. Impact Window: Feb 2026 to Feb 2027. Pipeline distributed across quarters; total allocation reconciles to $100K input.\n\nSLIDE 19 \u2014 Section divider: Paid Forecast\n\nSLIDES 20-22 \u2014 Paid Forecast:\nOwners: Alexandru Budur, Alexey Poltavsky's team, and Media Monks Agency. Cycle: 7-8 working days. Cadence: Week 5/6 and Week 11/12 of the quarter.\nProcess: Alexandru creates the manual raw paid forecast based on past average attainment and budget allocation. Shares with Alexey's team and agency for manual factoring (CPL and ROAS review \u2014 currently Day 1-6, 5+ business days). Future: automate by removing manual factoring step if impact is less than 1-2%. Alexandru applies budget in MDS to Vertica to Power BI to get respondents and expected AQC. Forecast merged via Tableau to generate dataset and feed the dashboard.\n4 Steps: Historical Performance (establish baseline using historical ROAS by T2 x GTM x Segment x Type) \u2192 Apply Planned Budget (use approved 2026 paid media budget) \u2192 Apply ROAS Multiplier (adjust for mix changes, optimisation, and scaling assumptions) \u2192 Validate & Refine (compare vs historical actuals).\nFormula: Forecasted Pipeline = Budget x ROAS x ROAS Multiplier. Example: Budget $1,953 x ROAS 3 x Multiplier 1.33 = forecasted pipeline.\n\nSLIDE 23 \u2014 Section divider: Free Forecast\n\nSLIDES 24-26 \u2014 Free Forecast:\nOwners: Kenneth Ng, Colin Eason. Cycle: 1 working day (30-45 mins for ML model). Cadence: Week 6 and Week 12 of the quarter.\nProcess: Kenneth runs ML model to generate Free Raw Forecast. Shreya updates raw tabs in Excel, removes/overrides forecasts above negative $5,000, applies factor by Tier 1 to ensure original reforecast totals at T1 level match new forecast. Forecast merged via Tableau.\n4 Steps: Define Free Pipeline (identify historical GC pipeline sourced from Free channels, align to scorecard definitions) \u2192 Identify Pipeline Patterns (analyse historical performance to understand growth trends and seasonality) \u2192 Forecast Free Pipeline (project future Free pipeline based on observed demand patterns) \u2192 Validate & Refine (compare vs actuals, refine to improve accuracy).\nModel: Prophet + XGBoost hybrid. Horizon: 52 weeks from 2026 Q1. Granularity: Weekly, rolled to quarterly.\nExample: AMER US Central ENT Cyber Identity Threats. Historical data: Jan 2024 to Apr 2026. Pipeline distributed weekly using seasonal patterns.\n\nSLIDE 27 \u2014 Section divider: SDR Prospecting Forecast\n\nSLIDES 28-29 \u2014 SDR Prospecting Forecast:\nContent marked \"To be updated\" in deck. 4-step framework structure exists but steps are not yet filled in. Example methodology slide shows same formula structure as Paid: Forecasted pipeline = Budget x ROAS x ROAS Multiplier, but this is a placeholder pending update.\n\nSLIDES 30-32 \u2014 Example Outputs / H1 Marketing Plan:\nThese slides contain example output visuals for the H1 Marketing Plan (EMEA region) and top EMEA H1 initiatives. Content is visual and region-specific; refer to your Business Partner for current-quarter examples.\n\nSLIDE 33 \u2014 Section divider: Scoring Logic\n\nSLIDE 34 \u2014 Lead Scoring Terms & Definitions:\nEngagement Score: Each type of marketing engagement has a score associated. Score is cumulative and increases as the number of engagements increase.\nEngagement Level \u2014 displays the current engagement level of lead or contact:\nEngaged: Person has done at least 1 engagement. Score is between 1 and 7.\nHighly Engaged: Person has done multiple engagements and has a cumulative score of 8.\nHand-Raiser: 1-to-1 action. Person has done a high-value, single engagement that should fast track the individual for immediate sales follow up. Scores 8.\nProfile Eligibility \u2014 eligibility requirements for a lead/contact to score:\nComplete Profile (Hand-Raiser fit), Limited Profile (Highly Engaged/Engaged fit), Ineligible profile (not supposed to score).\nLast Scored Engagement Date: Date of the most recent scored marketing engagement.\nAssigned Date: Stamps the date Marketing deems the person ready for sales follow-up (i.e. does a hand raising activity requiring a 24-hour SLA).\nSDL Date: Stamps the date on which SDRs disposition the lead (QLS = Validated or Disqualified).\nScore/Level Reset: Happens after dispositioning by SDRs (QLS = Validated or Disqualified), or when person has no marketing/sales activity (QLS = Auto-Recycle), or profile eligibility is lost (QLS = Auto-Disqualified).\nHand-Raiser Reason: Provides information on user marketing activity that was scored as Hand-Raiser level.\n\nSLIDE 35 \u2014 Qualification Lifecycle: Visual diagram showing the qualification journey from engagement through to SDR disposition. Refer to slide 35 in the deck for the visual flow.\n\nSLIDE 36 \u2014 Lead Status in Salesforce:\nLead Status = Open: Lead is ready for work but has not yet been picked up by an SDR.\nLead Status = Validated: SDR has reviewed and validated the signal.\nLead Status = Disqualified: SDR has reviewed and disqualified the signal.\nA signal at Highly Engaged is the maximum level within the cumulative scoring model.\n\nSLIDE 37 \u2014 Section divider: Pipeline Logic\n\nSLIDE 38 \u2014 How Veeam determines Bookings, Pipeline Created, Pipeline Goal Confirmed:\nNL ARR = New Licenses Annual Recurring Revenue. Veeam measures NL ARR based on opportunity type and account type.\nNL ARR Eligibility Rules: Opportunity Type is NOT Renewal, Opportunity Type is NOT Rental, Account Type = Customer or Prospect.\nBookings: Opportunity closed won. Counted when meets NL ARR rules.\nPipeline Created: Opportunity is created. Counted when meets NL ARR rules.\nPipeline GC: Opportunity reaches Goal Confirmed. Counted when meets NL ARR rules.\n\nSLIDE 39 \u2014 How Veeam determines Marketing & SDR Pipeline:\nAn opportunity is counted as Marketing & SDR Pipeline when EITHER of these scenarios are true:\nScenario 1: The opportunity has a qualification trigger (Hand-raiser, Highly Engaged, 6sense Qualified Account, Engaged, Active Buying Group, or Prospecting/SDR Prospecting) AND the opportunity first enters stage GC, C, PV, N, F, CW, CL, CP, or CV.\nScenario 2: The opportunity was created within the last 14 days AND entered a qualifying stage AND a Key Player is added anytime up to GC Date +14 days AND there was a marketing signal on the Contact (Key Player) within 3 months (VEL), 6 months (COM), or 9 months (ENT) before or equal to the Goal Confirmed date.\n\nSLIDE 40 \u2014 Where to find pipeline fields in Salesforce: Visual reference \u2014 see slide 40 in deck for field locations in SFDC.\n\nSLIDE 41 \u2014 Section divider: Marketing & SDR Pipeline Targets\n\nSLIDE 42 \u2014 Pipeline Targets waterfall:\nBookings Target (received from FP&A) \u2192 multiplied by Coverage Ratio = Pipeline GC Target \u2192 multiplied by Marketing & SDR Contribution = MKT & SDR Pipeline GC Target \u2192 multiplied by Quarterly Seasonality = Marketing & SDR Quarterly Target. Set collaboratively by MOPs, SDR, Marketing VP, and RVP.\n\nSLIDE 43 \u2014 Section divider: Attribution\n\nSLIDE 44 \u2014 Introduction to Veeam Attribution Model:\nWhat Attribution Does: Tracks marketing touchpoints of a contact. Connects anonymous and known interactions into a single timeline. Attributes opportunity creation and revenue to the channels that influenced the buyer journey. Provides multi-touch attribution across the entire opportunity.\nWhy It Matters: Shows what's driving pipeline across campaigns, channels, and content. Enables data-driven optimisation of marketing investments. Supports accurate, consistent campaign and channel performance reporting.\n\nSLIDE 45 \u2014 Key Attribution Concepts:\nTouchpoint: A tracked interaction (ad click, email, event, web session).\nAttribution Model: The rule set that distributes credit.\nPerson to Opportunity Association: How the model links the buyer's journey to revenue.\nChannels & Subchannels: Normalised categories that group activity consistently.\n\nSLIDE 46 \u2014 What information is captured for attribution:\nAll prospect/contact interactions are captured (online & offline) in Marketo Measure Ultimate (MMU).\nActivities captured: Consume digital asset (whitepaper, tech doc), attend virtual events (webinar, virtual demo), navigate veeam.com, download a product, attend a tradeshow/ATPL event/seminar, ask for sales contact.\nSources: Free (organic/direct search, email, web chat, social media, LLM) and Paid (paid advertising, paid social, display advertising) and Offline events.\nAssets tracked: Whitepapers, technical documentation, trial licenses, forum posts, industry reports.\n\nSLIDE 47 \u2014 W-Shape Attribution Model (GC driven):\nFirst Touch: 30% \u2014 the very first marketing interaction that introduces a prospect to brand or solution. Captures original source of awareness and lead generation.\nLead Create: 30% \u2014 the touchpoint where a key decision-maker or influencer becomes engaged. Represents the moment the opportunity becomes viable.\nGoal Confirmed / Opportunity (MKT Sourced): 30% \u2014 the activity that directly precedes or triggers GC opportunity creation in the CRM.\nMiddle Touches: 10% distributed dynamically \u2014 dynamic % distribution depends on number of touches; however, key interactions always receive the highest %.\n\nSLIDE 48 \u2014 Section divider: Attribution vs Scorecard\n\nSLIDE 49 \u2014 Attribution vs Scorecard (also known as Pipeline Source):\nScorecard (Pipeline Source): Static view. Refreshed real-time. Identifies the primary pipeline create source through agreed prioritisation logic. Filters: Account Type = Prospect & Customer, Opp Type = Net New Business, SDR created/Key Player Engagement, 3/6/9 months lookback window on GC Create Date.\nAttribution: Dynamic view. Refreshes 1-3 business days (processing time). Attributes percentage of pipeline across all marketing touchpoints up to GC.\n\nSLIDE 50 \u2014 Section divider: Dashboards\n\nSLIDE 51 \u2014 Dashboard Navigation:\nHow to find Marketing Operations dashboards: https://bi.veeam.com/views/MarketingDashboardNavigation/Navigation\n\nSLIDE 52 \u2014 Section divider: CMO Scorecard\n\nSLIDES 53-56 \u2014 CMO Scorecard (4 views):\n1. Goal Confirmed Pipeline Results (slide 53): Provides a clear view of pipeline vs target attainment, highlighting where pipeline gaps remain and require action, and overall Marketing & SDR pacing vs quarterly expectations.\n2. Goal Confirmed Pipeline Linearity & Linearity Delta (slide 54): Tracks pipeline creation over time against expected quarterly linearity and prior year pacing. Quantifies cumulative variance to plan, enabling early identification of pacing risk, rapid course correction within the quarter, and clear visibility into momentum vs shortfall.\n3. Marketing & SDR Attainment by Sales Coverage (slide 55): Shows pipeline attainment by segment and region, highlighting where Marketing & SDR exceed target, where coverage is below required levels, and segment-level performance concentration and risk.\n4. Pipeline Details (slide 56): Provides full details into individual opportunities, including direct drill-through to Salesforce for action.\n\nSLIDE 57 \u2014 Section divider: Paid Advertising\n\nSLIDE 58 \u2014 Section divider: Marketing Budget Management\n\nSLIDE 59 \u2014 Budget Agenda:\nUnderstanding Budget Status: Tableau Dashboard. MBM Tool. Salesforce Sponsorship. Coupa for Marketing Purchase Requisitions (PR). Coupa PR Set Up by Contract Type. JIRA Ticket for Budget Management.\n\nSLIDE 60 \u2014 MBM Tool Overview:\nWho: Marketing, Marketing Ops are main users.\nWhat: Used to manage Marketing budget annual plan inputs, quarterly reforecasting, inter-marketing transfers, external funds; serves as budget tags for spend tracking.\nWhere: https://mbm.veeam.com (VPN required + Chrome/Firefox browser).\nWhy: Provide Marketing visibility into budget & spend, used to reflect Netsuite transactions for alignment.\nHow: MBM budgets are used for tagging in Coupa POs & SF Sponsorships to track spend & sponsorships.\nImportant: MBM does NOT connect to Finance system (Netsuite). MBM budget is mainly for reporting purposes only.\n\nSLIDE 61 \u2014 Section divider: Understanding Budget Status \u2014 Tableau Budget Dashboard\n\nSLIDES 62-63 \u2014 Systems used in Budget Management:\nThree systems feed Tableau Budget Dashboard (VPN & Non-Safari Browser required):\nMBM: Plan = the finalized plan submitted during Annual planning. Reforecast, Transfers after Reforecast, Incremental Funds after Reforecast = values get updated AFTER every quarterly reforecast.\nSFDC (Salesforce): Sponsorship by Budgets = allocated to quarter based on SF campaign start date. If sponsorship is created late in SFDC, it will allocate to quarter of sponsorship submission for payment.\nCoupa: Committed = spend amortized monthly based on PO delivery start and end dates, NOT when invoice is paid. Committed line only accounts for approved PRs (i.e. POs).\n\nSLIDE 64 \u2014 Section divider: Marketing Budget Management (MBM) Tool\n\nSLIDE 65 \u2014 Budget Key Players:\nGlobal Approver (MOps Sr. Director): meets with CMO & Finance to review/approve/finalize planning and reforecasts.\nBudget Owner: reviews/approves budget plans, transfers, incremental funds requests.\nParent Manager: inputs/submits budget plans, creates/approves transfers & incremental funds requests.\nManager: inputs budget plans, creates/approves transfers & incremental funds requests.\n\nSLIDE 66 \u2014 Main MBM Sections:\nBudget Plans: for inputting & submitting annual plan, quarterly reforecast plans.\nTransfers: for transfers between Marketing budgets only.\nIncremental Funds: notify Mei of external funds, requires Netsuite document number.\nApprovals: section to approve/reject transfer or incremental fund requests.\nGroup Activities: for annual & quarterly detailed plan inputs. URL: https://mbm.veeam.com/groupedActivities\n\nSLIDE 67 \u2014 Section divider: Salesforce Sponsorship\n\nSLIDE 68 \u2014 Salesforce Sponsorship:\nSponsorships are funds from partners/third-party to Veeam for supporting Marketing activity.\nHow to create: https://confluence.veeam.com/display/MBM/10.0+Sponsorship\nTag the correct budget name on sponsorship. Last day to create sponsorship with current year budget is Dec 31st. Sponsorship is tied to quarter of campaign start date (unless submitted late, then tied to quarter of sponsorship submission). Invoice status needs to be \"Submitted for Payment\" or \"Paid\" to appear in report.\n\nSLIDE 69 \u2014 Section divider: Coupa for Marketing Purchase Requisitions (PR)\n\nSLIDES 70-74 \u2014 Coupa PR Creation:\nConfluence tips page: https://confluence.veeam.com/display/GTMPBA/Coupa+Marketing+PR+Creation+Tips\nHow to select MBM budget & Finance Cost Center: Click the magnifying glass under the \"Billing\" section during PR creation.\nPR setup by contract type:\nSingle activity (e.g. In-person Event): Single campaign, single Coupa PR, tag with single campaign, single invoice accepted.\nMultiple activities (e.g. Virtual Webinar Series Q1, Q2, Q3): Multiple campaigns, multiple Coupa PRs. Tag each PR with the respective campaign & cost amount. Select the same Veeam Subsidiary/Legal Entity on each PR. Submit each PR using the same contract. Add a comment on PR to notify Procurement that the contract covers multiple activities (PR1, PO2, etc). Acceptable invoicing: multiple invoices (one per PO) or single invoice outlining each PO cost as separate line items.\nOverhead cost covering multiple activities (e.g. registration software fees): Single campaign (Parent, Type=Operational, Subtype=Data Management), single Coupa PR, tag with Parent campaign, single invoice.\nKey rule: Only one campaign per PR. Ideal situation is one contract per activity.\n\nSLIDE 75 \u2014 Section divider: JIRA Ticket for Budget Management\n\nSLIDE 76 \u2014 JIRA Budget Requests:\nCreate JIRA ticket to project \"AEM\" (MOps): https://tracker.veeam.com/projects/AEM/summary\nUse for: Open future year MBM budget tag for Coupa use. Changes in budget owner/parent manager/manager for budget. Not seeing Coupa changes reflected in dashboard after one day. Not seeing your PO reflected in Committed against your budget. How to record fund transfers between Marketing & Sales/Sales Alliances MDF budgets.\n\nSLIDE 77 \u2014 Section divider: Marketing Quarterly Reforecast Process\n\nSLIDES 78-86 \u2014 Quarterly Reforecast Process:\nCadences: Quarterly Reforecast = the month after each quarter ends (Q2/Q3/Q4 reforecast) via MBM. Mid-Q4 Budget Rebalance = November via JIRA (for Budget Owner & Parent Managers).\n6 Steps:\nStep 1 \u2014 Close out open items in Quarter: Close pending Transfers & Incremental Funds, submit PRs before quarter end, use Tableau Details by Supplier view.\nStep 2 \u2014 Bottom-Up Planning (optional): Use Grouped Activities in MBM to add/edit activities, allocating cost to quarters based on expected delivery dates & average monthly cost. Example: Event Promo A, delivery Mar 1 to May 20, cost $3,000, duration 3 months, cost per month $1,000. Create 2 activities: Event Promo Q1 = $1,000, Event Promo Q2 = $2,000.\nStep 3 \u2014 Review budget details in MBM or Tableau: Go to MBM Budget Plans section, filter & select your budget, click Edit. Or review via Tableau Budget Dashboard.\nStep 4 \u2014 Calculate current quarter spend & total remaining funds: For each quarter: Current Budget without Sponsorship = Last Reforecast + Transfers after Reforecast + Incremental Funds after Reforecast. Committed after Sponsorship = Committed minus Sponsorship by Budgets. Set completed quarters = Committed after Sponsorship. Assess total remaining funds = TOTAL Current Budget without Sponsorship minus TOTAL Completed Quarters. Allocate total remaining funds between future quarters. Check that reforecast total matches total Current Budget without Sponsorship (if negative total for completed quarters due to a refund, check reforecast total = Current Budget without Sponsorship + refunded amount).\nStep 5 \u2014 Input forecasted numbers into Budget Plans: Go to MBM Budget Plans section (Reforecast: Q#), select budget, click Edit. Input values for each quarter. Update segment % and global program campaign % as needed. Click \"Save as Draft\". Inform Parent Manager that Reforecast Budget Plan is ready for review.\nStep 6 \u2014 Submit Reforecast plan to Budget Owner for Approval: Budget Parent Manager selects budget and clicks \"Submit To Owner\" once reviewed. MOps will reach out if additional adjustments are needed.\n\nSLIDES 87-91 \u2014 Budget Templates:\nTwo key templates available: Quarterly Reforecast Calculator and Budget Allocation Template.\nQuarterly Reforecast Calculator (slide 88): Save a copy of the Excel file. Copy all values from your MBM Budget Plan Edit form into the respective cells. Resource: Quarterly Reforecast Calculator \u2014 Save a Copy.xlsx.\nBudget Allocation Template (slides 89-91): Used for in-progress PRs to allocate cost by month & quarter. For approved PRs, input Tableau dashboard Committed allocated by quarter into template. Step 1: Input activity name, cost & delivery dates for current year in-progress PRs. Separate amount by delivery year. Fill in expected monthly committed (auto-calculated). Check totals \u2014 budget should only be used on PR lines with matching service delivery dates. Step 2: Input quarterly Committed from Tableau dashboard (from approved PRs). Fill in Original Plan from MBM for reference. Use existing + planned PO total as a guide. Adjust quarters to ensure funds cover quarterly costs and total matches Original Plan total. Resource: Budget Allocation Template \u2014 Save a Copy.xlsx.\n\nSLIDE 92 \u2014 Campaign Creation:\nHow to Create New Campaigns in Salesforce: In the Campaigns tab, click \"+New Campaign\" in the drop down OR click the [New] button in the top right-hand corner. Do NOT clone existing campaigns (use as reference only, avoid cloning as best practice). Input campaign values \u2014 refer to Confluence page \"Salesforce Campaign Framework\" for all mandatory fields.\n\nSLIDE 93 \u2014 Mandatory Fields for Campaign Creation:\nCampaign Name (use Naming Convention & Builder Tool), Campaign Type (see Descriptions), Campaign Sub-Type (see Descriptions & Dependency), Global Campaign-Program/GoDo (see Descriptions & Framework), Tier 1 through Tier 4 (regional identifiers & targets), Marketing Group, Sales Group, Department (see Descriptions), Segment, Start Date, Campaign Start Date Description, Template, Expected Cost USD, Expected GC Pipeline USD, Content/Source/Ccode (populated through automation \u2014 Foundation).\n\nSLIDE 94 \u2014 Content/Source/Ccode Field:\nThe most powerful field on your Salesforce Campaign. Use case: This field links your SFDC campaign to an online asset/form. The connection and values here send the person who fills a form into your SFDC as a campaign member. Who fills it in: The value is auto-populated as [prefix_CampaignID]. Prefixes are based on what is selected as the Campaign Type and Sub-type when creating your campaign.\n\nSLIDE 95 \u2014 List Import Process & Templates:\nForms & Templates via Veeam ServiceDesk:\nUpload & Grade CM Status Leads: CM Status Upload Template.xlsx\nUpload Leads for Customer Activity: External Media for CA-template (Webinar).xlsx, Paid Media for CA-template (CS).xlsx, Sponsored Content Template.xlsx.\n\nSLIDE 96 \u2014 List Import Use Cases:\nCampaign Member Status: Mainly used for In-Person Events or Offline Activities (tradeshows, telemarketing). Users must input Campaign Member Status to ensure leads are scored and prioritised. Resource: Campaign Member Status and Lead Scoring on Confluence.\nCustomer Activity: Mainly used for Virtual Events or Online Activities (webinars, content syndication). Users must input the appropriate Content/Source/Ccode to ensure leads are scored and prioritised. Resource: Engagement Scoring & Campaigns on Confluence.\n\nSLIDE 97 \u2014 Section divider: Web Analytics Methodology\n\nSLIDES 98-100 \u2014 Web Analytics:\nGA4 Data Capture: A GA4 tag (via GTM or gtag.js) fires on site/app and sends interaction data. All activity is recorded as events. GA4 stitches events into users and sessions. GA4 adds context like source/medium/channel, device, geography, and ties outcomes back to acquisition. Processed data appears in Reports/Explore and optionally BigQuery.\nWeb Analytics Lifecycle: Instrument (data layer \u2014 in partnership with Dev teams to maintain data layer pushes). Capture & Standardize (GTM + Custom Builds \u2014 Google Tag Manager fires data layer interactions; custom tracking follows Veeam Syntax). Enrich & Govern (GA4 \u2014 Veeam Syntax provides standardized events/parameters). Report (Best-fit Platform \u2014 Looker Studio, GA4 Explore, Tableau, bespoke platforms). Operate (Cadence + Ad Hoc \u2014 ad hoc analysis, always-on dashboards, interval-based reporting for product and project launches).\nKey Measurements \u2014 scoped around Sessions, Users, and Events:\nTraffic & Reach: Views (Page/Screen Views), Sessions, Total Users, Entrances, Entrances per Session.\nEngagement Quality: Engaged Sessions, Engagement Rate %.\nOutcomes: Key Event (Goal) Conversions.\nAcquisition & Attribution: Channel Grouping, Source/Medium.\nAudience & Device: Country, Language, Device.\nJourney & Behavior: Navigation/User Journey.\n\nSLIDE 101 \u2014 Web Analytics: Project and Product Launch Reporting \u2014 section heading only, content not yet available in deck.\n\nSLIDE 102 \u2014 Section divider: Appendix\n\nSLIDES 103-104 \u2014 Glossary of Key Terms & Acronyms:\nNL ARR: New Licenses Annual Recurring Revenue. Veeam's primary revenue metric for marketing contribution. Excludes Renewals and Rentals.\nGC/Goal Confirmed: The opportunity stage in Salesforce where a deal is considered qualified and entered the pipeline. Used as the primary trigger for marketing pipeline measurement.\nHand-Raiser: A contact who has completed a high-value, 1:1 marketing action (e.g. demo request, contact sales) that triggers immediate SDR follow-up within 24 hours. Scores 8 in the engagement model.\nHighly Engaged: A contact who has accumulated a cumulative engagement score of 8+ through multiple marketing interactions.\nEngaged: A contact who has completed at least one scored marketing engagement. Engagement score between 1 and 7.\nQLS: Qualified Lead Status. The disposition applied by SDRs: Validated, Disqualified, or Auto-Recycle.\nSDL Date: Sales Development Lead Date. The date an SDR dispositions a lead.\nROAS: Return on Advertising Spend. Pipeline generated per dollar of paid media budget. Used as the key input for the Paid forecast.\nMBM: Marketing Budget Management. Veeam's in-house budget management tool at mbm.veeam.com.\nPR/PO: Purchase Requisition/Purchase Order. PRs are raised in Coupa to initiate vendor spend; approved PRs become POs.\nMMU: Marketo Measure Ultimate. Adobe/Marketo's attribution platform used to capture all touchpoints and attribute pipeline to marketing channels.\nMDS: Marketing Data System. Internal data infrastructure layer that aggregates campaign and paid media data, feeding into Vertica and Power BI.\n6QA/6sense: 6sense Qualified Account. A signal from the 6sense intent platform indicating an account is showing buying intent. Used as a qualification trigger for pipeline counting.\nT1/T2/T3/T4: Tier hierarchy for campaign taxonomy. T1 = Business Motion, T2 = GoDo Theme, T3 = Regional/Segment, T4 = Execution campaign.\nGoDo: Go-Do. A Veeam GTM program that maps a specific market play to a product hero, sales motion, and target segment.\nENT/COM/VEL: Enterprise/Commercial/Velocity. The three primary sales segments at Veeam, each with different pipeline lookback windows and target ratios.\nABM: Account-Based Marketing. A strategy targeting specific high-value accounts with personalised campaigns. At Veeam, ABM focuses on $100K+ opportunity accounts.\nFP&A: Financial Planning & Analysis. The Finance team that provides Bookings Targets and Coverage Ratios used to derive pipeline targets.\nGTM: Go-To-Market. The strategic framework defining how Veeam brings products to market across segments and regions.\nSDR: Sales Development Representative. The team responsible for qualifying inbound marketing signals and conducting outbound prospecting.\nMDF: Market Development Funds. Budget allocated by partners or vendors for joint marketing activities.\nSFDC: Salesforce.com. Veeam's CRM platform.\nGTM (Google Tag Manager): Google Tag Manager. The tag management system used to deploy GA4 and other tracking tags on veeam.com.\nGA4: Google Analytics 4. Veeam's primary web analytics platform for tracking user behaviour on veeam.com.\nAttribution Model: The rule set that distributes credit for pipeline across marketing touchpoints. Veeam uses a W-shape model with emphasis on First Touch, Lead Create, and Goal Confirmed moments.\nCCode/Ccode: Campaign Code. The Content/Source/Ccode field on a Salesforce campaign that links it to Marketo forms for inbound lead routing.\nAEM: The JIRA project code for Marketing Operations requests (tracker.veeam.com/projects/AEM).\nVDC/VDP/VCS: Veeam Data Cloud/Veeam Data Platform/Veeam Cyber Secure. Key Veeam product families referenced in 2026 GoDos.\n\nSLIDE 105 \u2014 Section header: MOPs SLA & Process Cadence Summary\n\nSLIDES 106-107 \u2014 MOPs SLA & Process Cadence Summary:\nThis table consolidates all key SLAs and process cadences from across the MOPs operating model. Use it to set expectations with stakeholders and plan your workload.\nPipeline Forecast Cadences:\nRegional Forecast: Week 5/6 and Week 11/12 of each quarter, approximately 2 working days.\nPaid Forecast: Week 5/6 and Week 11/12 of each quarter, 7-8 working days.\nFree (ML) Forecast: Week 6 and Week 12 of each quarter, 1 working day.\nSDR Prospecting Forecast: Week 5/6 and Week 11/12 of each quarter, 1-2 working days.\nSignal & Opportunity SLAs:\nHand-Raiser (high-value single action): 24-hour SDR follow-up from signal date. Owner: SDR team.\nHighly Engaged: Owner: SDR team.\nList Import (Campaign Member Status): Process via Veeam ServiceDesk ticket. Owner: MOPs/ServiceDesk.\nQualified to Sales Accepted Stage: 1 day. Owner: SDR & Sales.\nSales Accepted to Goal Confirmed Stage: 3 days. Owner: SDR & Sales.\nAttribution & Reporting SLAs:\nAttribution (Marketo Measure): 1-3 business days processing time. Dynamic \u2014 refreshes continuously.\nCMO Scorecard/Pipeline Reports: Real-time (Tableau). Data from Salesforce; refreshes on Salesforce sync.\n\nKNOWN GAPS (content not yet available in current deck version):\nSlides 28-29: SDR Prospecting Forecast 4-step content marked \"To be updated\".\nSlide 101: Web Analytics Project/Product Launch Reporting \u2014 section heading only, no content.\nSlides 30-32: H1 Marketing Plan example outputs \u2014 visual-only slides, no extractable process content.\nSlide 35: Qualification Lifecycle \u2014 visual diagram only, refer to the deck for the visual flow.\nSlide 40: Salesforce pipeline fields \u2014 visual screenshot only, refer to the deck.\n\n=== CONFLUENCE PAGE 1: Engagement Scoring ===\nSource URL: https://veeam.atlassian.net/wiki/spaces/NMA/pages/168547441/Engagement+Scoring\nLast updated: March 2026\n\nThis page outlines key areas of Veeam's scoring model.\n\nLEAD SCORING TERMS & DEFINITIONS:\nEngagement Score: Each type of marketing engagement has a score associated. Score is cumulative and increases as the number of engagements increase.\nEngagement Level values:\n- Engaged: Person has at least 1 engagement. Score is 2, 4 or 6.\n- Highly Engaged: Person has multiple engagements and has a cumulative score of 8.\n- Hand-Raiser: 1-to-1 action. Person has done a high-value, single engagement that should fast track the individual for immediate sales follow up. Scores straight 8.\n- Fast Path: Person has engagement with specific Securiti AI, Vault, VDC assets. Fast track the individual for immediate sales follow up. Scores straight 8.\n\nProfile Eligibility:\n- Complete Profile (Hand-Raiser/Highly Engaged/Fast Path/Engaged fit): Phone number exists, business email is valid, company name is not empty, not a Competitor, not in Financial Sanctions or Russia/Belarus, not a partner account type or in partner domain list and Sales Team is not Channel.\n- Limited Profile (Hand-Raiser/Highly Engaged/Engaged fit): Email is validated OR phone number exists, not a Competitor, not in Financial Sanctions or Russia/Belarus, not a partner account type or in partner domain list and Sales Team is not Channel.\n- Ineligible Profile: Not supposed to score. No Engagement Score/Level. Usually Account type=Partner or Sales Team is Channel.\n\nLead Locked on Partner: Will NOT be excluded from scoring and Marketing Stage progression BUT will be hidden from SF reporting so that sellers do not touch.\n\nONLINE SCORING TABLE (key entries):\n- Contact Us / Sales Inquiry: Score 8, Hand-Raiser YES. Covers: Request Live Demo, Sales Inquiry, Request Quote, Booked a Meeting, Contact Partner.\n- Product Trial License (paid only \u2014 license key activated, product not owned): Score 8, Hand-Raiser NO. Once per 1h.\n- Product Download (M365, SFDC, Kasten, Platform \u2014 prospect or product not owned): Score 8, Hand-Raiser NO. Once every 30 days.\n- Product Download (product already owned): Score 4, Hand-Raiser NO. Once every 3 months.\n- Kasten K10 Free: Score 8, Hand-Raiser NO. Once every 30 days.\n- Virtual Hands On Labs (attended): Score 6, Hand-Raiser NO.\n- Virtual Product Demo (attended): Score 6, Hand-Raiser NO.\n- Virtual Product Demo (registered): Score 2, Hand-Raiser NO.\n- Webinar (attended + Sales Ready): Score 8, Hand-Raiser YES.\n- Webinar (attended from external source): Score 6, Hand-Raiser NO.\n- Webinar (attended from GTW integrated): Score 4, Hand-Raiser NO.\n- Webinar (registered): Score 2, Hand-Raiser NO.\n- On-Demand Product Demo: Score 6, Hand-Raiser NO.\n- On-Demand Webinar: Score 4, Hand-Raiser NO.\n- Technical Document: Score 4, Hand-Raiser NO. Once every 7 days.\n- DRMM Workshop (survey): Score 8, Hand-Raiser YES.\n- Whitepaper download: Score 2, Hand-Raiser NO.\n- Solution Brief download: Score 2, Hand-Raiser NO.\n- Free product downloads: Score 2, Hand-Raiser NO. Once every 30 days.\n\nOFFLINE SCORING TABLE (list import, key entries):\n- Member Status=Sales Ready: Score 8, Hand-Raiser YES.\n- Member Status=Meeting Booked: Score 8, Hand-Raiser YES.\n- Member Status=Attended C-Level Lead: Score 6, Hand-Raiser NO.\n- Member Status=Attended Product Demo: Score 6, Hand-Raiser NO.\n- Veeam-led Event + Member Status=Attended: Score 6, Hand-Raiser NO.\n- Member Status=Attended: Score 4, Hand-Raiser NO.\n- Member Status=Scanned: Score 4, Hand-Raiser NO.\n- Member Status=Registered: Score 2, Hand-Raiser NO.\n- Member Status=Sent: Not Scored.\n\nFAST PATH:\n- Fast Path Vault: When an existing VDP customer engages with online Vault assets (Campaign Name contains 'Vault'), score elevated to 8, Engagement Level set to Fast Path. Added to SF campaign: Fast Path-Vault +8.\n- Fast Path Step-up 365: When an existing Veeam Backup for Microsoft 365 customer engages with online VDC assets (GoDo = ENT - Cyber Identity Threats, but not VB365/on-prem product focused), score elevated to 8. Added to SF campaign: Fast Path-Step Up 365 +8.\n- Fast Path Securiti AI: When ATPL Contacts in Fortune 500/Forbes 2000 engage with Securiti AI assets/events, score elevated to 8. Added to campaign: DATA MGT_#1SAI_EN_WW_26Q1_Fast Path Securiti AI ATPL +8.\n\nHOW ENGAGEMENT LEVEL & ASSIGNED DATE ARE SET:\n- If Engagement Score = 8 \u2192 Engagement Level changes to Highly Engaged.\n- If Engagement Score = 2, 4 or 6 \u2192 Engagement Level changes to Engaged.\n- If Engagement Level is Highly Engaged, Hand-Raiser, or Fast Path \u2192 Assigned Date is stamped with system date & time.\n\nCOOL DOWN PERIOD:\nWhenever QLS switches to certain values, Marketo puts people in a 30-day cool down period during which they cannot be scored. Hand-Raisers from Web Forms are exempt (sales inquiries, get live demos etc. will always score).\n- QLS last stage change date in past 30 days and QLS = Validated\n- QLS last stage change date in past 60 days and QO = Existing Open Opportunity\n- QLS last stage change date in past 30 days and QO = Not Sales Ready / Existing end-user\n- QLS last stage change date in past 180 days and QO = Service Provider Subscriber\n\nSCORE & LEVEL RESET \u2014 3 scenarios:\n1. Lead dispositioned by sales (Validated or Disqualified): Engagement Score, Engagement Level, Last Scored Engagement Date, Assigned Date = NULL.\n2. No marketing or sales activity (Auto-Recycle): 180 days for ENT/FED, 90 days for other segments. QLS, LS, CS = Disqualified, Qualification Outcome = Auto-Recycle.\n3. Profile eligibility lost = Ineligible Profile (Auto-Disqualified) or record is Competitor: QLS, LS, CS = Disqualified, Qualification Outcome = Auto-Disqualified.\n\nSecond chance for Auto-Disqualified: When profile eligibility changes from Ineligible to Complete or Limited Profile and QO is Auto-Disqualified (not from being a Competitor), they get a chance to score again.\n\nFor scoring issues, contact: dan.roth@veeam.com or alexandra.aghinitei@veeam.com.\n\n=== CONFLUENCE PAGE 2: CMO Dashboard \u2014 Executive Documentation ===\nSource URL: https://veeam.atlassian.net/wiki/spaces/GTMPBA/pages/207009700/CMO+Dashboard+-+Executive+Documentation\nLast updated: May 2026\nTableau link: https://bi.veeam.com/#/workbooks/3311/views\n\nPURPOSE:\nProvide a single, trusted executive view of Marketing's run-the-business performance, enabling leadership to:\n1. Quickly assess revenue and pipeline health.\n2. Understand Marketing and SDR contribution across the funnel.\n3. Monitor brand, demand, and efficiency signals that drive future growth.\n4. Make investment, prioritization, and risk decisions with confidence.\nThis dashboard is intentionally executive friendly and business driven. It does not replace functional dashboards or operational reporting.\n\nHOW THE DASHBOARD IS INTENDED TO BE USED:\n- Executive first: Designed for CMO staff meetings, weekly performance tracking, QBRs, and board prep.\n- Signals over detail: Focused on directional performance (QoQ / YoY), not raw activity.\n- Governed metrics: All KPIs shown follow formal governance.\n\nDASHBOARD KPI INVENTORY (Executive View):\nWebsite Traffic - Sessions: Total distinct user interactions with website. Top-of-funnel demand signal. Covers www.veeam.com and go.veeam.com.\nWebsite Traffic - Unique Pageviews: Deduplicated page views across all pages. Top-of-funnel demand signal.\nWebsite Conversion Rate (%): % of sessions resulting in a conversion.\nWebsite Engagement Rate (%): % of engaged sessions (duration >10 seconds, conversion, or 1+ page).\nSEO Share of Voice (Non-Branded): % of non-branded keywords where Veeam ranks on page 1 (US and English-speaking markets). Brand leadership indicator.\nTrue Rank (Branded): Average ranking for branded keywords (US, EN language).\nTrue Rank (Non-Branded): Average ranking position across non-branded keywords. Growth and acquisition signal.\nAEO Visibility (AI Search): Visibility of Veeam content across AI search platforms (ChatGPT, Gemini, Perplexity etc.). Emerging discovery signal.\nPR Share of Voice: % of earned media coverage vs competitors (USA, UK, Germany and France only).\nMedia Coverage \u2014 PR Target Attainment: Tracks attainment across three tiers \u2014 Signature (top-priority placements), Media (broader planned coverage), Engagement (media interviews).\nSignals Created (HR, HE, 6QA): Count of qualified marketing signals \u2014 Hand Raiser, Highly Engaged, and 6QA. Leading indicator of future pipeline health.\nSignal Touch Rate (%) (HR & HE only): % of HR and HE signals touched by SDRs (at least one SDR activity logged).\nEO Created (# / $): Number and value of Early Opportunities created. Measures top-of-funnel opportunity momentum.\nEO to GC Conversion Rate (%): % of EOs converting to GC+ stage.\nDeal Registration: Count and value of deal registrations with status Approved or Expired within current quarter. Indicator of channel momentum.\nAvg Buying Group Members: Average number of buying group members per opportunity.\nTotal GC Pipeline ($/#): Marketing & SDR influenced + Other pipeline sources past GC stage. Primary outcome metric.\nMarketing & SDR GC Pipeline ($/#): GC pipeline value sourced/influenced by MKT & SDR.\nMarketing Pipeline: Marketing & SDR pipeline on goal confirmed stage (Frozen GC).\nMarketing & SDR GC to Closed-Won Conversion (%): % of GC pipeline converting to closed-won.\nMarketing & SDR Closed Won ($/#): Marketing & SDR at Closed Won stage. Primary outcome metric.\nNet Promoter Score (NPS): Industry standard scoring detractors and promoters. Retention and expansion signal.\nENT $100K+ Accounts Pipeline ($): Net new ARR pipeline sourced by Marketing & SDRs from enterprise accounts with $100K+ potential.\nAccounts Ending ARR ($): Total Ending ARR at quarter end across accounts that have reached $100K+ ARR.\nNet New Account ARR ($): Total Ending ARR generated by Net New ENT $100K+ accounts closed during the period.\nNet New Accounts (#): Total number of Net New ENT $100K+ accounts during the year.\nNet New Accounts QTD (#): Quarter-to-date count of Net New ENT $100K+ accounts.\n# of ATPL: Number of contacts Above the Power Line engaged within ENT $100K+ accounts. ATPL includes IT Leaders, CIO/CTO, Security Leaders, and Executive Leaders.\nF500 Sourced Global Customers: Number of Global Customers that are Fortune 500 sourced in the period.\nG2000 Sourced Global Customers: Number of Global Customers that are Global 2000 sourced in the period.\nPenetration Rate (%): % of Fortune 500 or Global 2000 account universe that are Veeam customers.\nEnding ARR ($): Ending ARR from Fortune 500 and Global 2000 customers.\nOpen Pipeline ($): Total open pipeline value associated with Fortune 500 and Global 2000 accounts.\nGlobal Customers (#): Total number of Global Customers belonging to Fortune 500 or Global 2000 lists.\nGross Retention Rate (%): Retained and expanded ARR vs STLY. Revenue stability indicator.\nIn-Period Renewal Rate: Renewed ARR QTD as proportion of renewable base ARR. Continued subscription renewal signal.\nProgram Spend ($): Total committed program spend incurred by Marketing during the period. Reported at aggregate level only.\nMarketing Pipe to Spend: Marketing & SDR Pipeline to Spend ratio. Capital allocation signal.\nMarketing Closed Won to Spend: Marketing & SDR Closed Won to Marketing spend ratio. Capital allocation signal.\n\nFUNNEL (LIVE VALUE) VIEW:\nEnd-to-end snapshot of live pipeline value across opportunity funnel, grouped into Early, Sales, Late, and Closed stages. Pipeline segmented by source attribution showing Marketing & SDR contribution vs other sources at each stage.\n\nPOINT-IN-TIME PIPELINE CONVERSION VIEW:\nShows how opportunities at a specific starting stage and date have progressed over time. Tracks whether pipeline value has remained in stage, moved forward, closed won, or closed lost. Excludes opportunities that bypassed the selected stage or were created after the stage date.\n\nPRE-PIPELINE VIEW:\nEarly quality and execution health check on Marketing and SDR-owned pre-pipeline opportunities. Focuses on engagement coverage, follow-up discipline, and buying group readiness before opportunities enter later funnel stages.\nKey KPIs in Pre-Pipeline view:\n- % Opps Unattempted: % of opportunities with zero call attempts, calls, emails or meaningful activities.\n- % Opps Untouched: % of opportunities with zero calls, emails or meaningful activities (despite attempts made).\n- % Opps with No Touch (30d): % of opportunities with no touch in last 30 days.\n- % Opps with No Touch (14d): % of opportunities with no touch in last 14 days.\n- % Opps Low Buying Group: % of opportunities below buying group benchmark (ENT-Named: 3, COM-Named: 3, COM-Inside: 2, VEL: 1).\nBuying group benchmark by segment: ENT Named = 3, COM Named = 3, COM Inside = 2, VEL = 1.\n\nGOVERNANCE NOTE:\nDashboard scope is locked for executive use. Any changes follow the formal Scorecard Enhancement & Request Intake process. This scorecard is Phase 1 of a multiphase executive scorecard rollout. Future phases will expand to include Campaign & ROI performance, Forecasting, Customer 360 insights, and other capabilities.";
const SUGGESTED_QUESTIONS = [
  { label: "3 Key Priorities", q: "What are the 3 key priorities for Marketing Operations?" },
  { label: "Lead Scoring", q: "How does lead scoring work and what are the engagement levels?" },
  { label: "Fast Path", q: "What is Fast Path and how does it differ from Hand-Raiser?" },
  { label: "Score Reset", q: "When does an engagement score get reset and what triggers it?" },
  { label: "Pipeline Logic", q: "How does Veeam determine what counts as Marketing & SDR pipeline?" },
  { label: "Paid Forecast", q: "How is the paid forecast calculated?" },
  { label: "Attribution Model", q: "How does the W-shape attribution model work?" },
  { label: "CMO Dashboard", q: "What KPIs are in the CMO Dashboard and what does each measure?" },
  { label: "Pre-Pipeline KPIs", q: "What are the pre-pipeline KPIs in the CMO Dashboard and what do they mean?" },
  { label: "Campaign Creation", q: "What are the mandatory fields when creating a Salesforce campaign?" },
  { label: "Buying Group", q: "What are the buying group benchmarks by segment?" },
  { label: "New to MOPs?", q: "I'm new to MOPs — where should I start?" },
];
const FEEDBACK_REASONS = ["Wrong info","Too vague","Not relevant","Missing info","Confusing answer"];
let messages=[],loading=false,feedback={};

function latticeAvatar(){
  return '<div class="avatar-agent"><svg width="23" height="23" viewBox="0 0 36 36" fill="none"><circle cx="3" cy="33" r="1.5" fill="#00A278" fill-opacity="0.2"/><circle cx="15" cy="21" r="2" fill="#00c896" fill-opacity="0.5"/><circle cx="27" cy="9" r="3" fill="#00d4a0"/><circle cx="33" cy="3" r="3" fill="white"/><polyline points="3,33 15,21 27,9 33,3" fill="none" stroke="#00d4a0" stroke-width="0.75" stroke-opacity="0.35" stroke-dasharray="2 2"/></svg></div>';
}

async function askClaude(msgs){
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,system:DECK_KNOWLEDGE,messages:msgs})
  });
  const d=await res.json();
  return d.content?.find(b=>b.type==="text")?.text||"Sorry, something went wrong.";
}

async function submitFeedback(idx){
  const fb=feedback[idx];
  if(!fb?.reason)return;
  const question=messages[idx-1]?.content||"Unknown question";
  const answer=messages[idx]?.content||"Unknown answer";
  setFB(idx,{submitting:true});renderMessages();
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",max_tokens:1000,
        system:'You are a Jira integration assistant. When asked to create a Jira issue, use the mcp__atlassian_veeam_workspace__createJiraIssue tool to do so. After creating the issue, respond with ONLY a JSON object: {"key":"AEM-123","url":"https://veeam.atlassian.net/browse/AEM-123"}',
        messages:[{role:"user",content:"Create a Jira Task in project AEM (cloudId: 2b38704d-0e31-42cc-8758-8f90b45668f8) with:\nSummary: [MOPs Agent Feedback] "+fb.reason+"\nDescription:\nFeedback reason: "+fb.reason+"\nQuestion asked: "+question.substring(0,300)+"\nAnswer given: "+answer.substring(0,500)+"\nSubmitted: "+new Date().toISOString()}],
        mcp_servers:[{type:"url",url:"https://mcp.veeam.com/atlassian-veeam-workspace/mcp",name:"atlassian_veeam_workspace"}]
      })
    });
    const d=await res.json();
    const txt=(d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join(" ");
    const all=[txt,...(d.content||[]).filter(b=>b.type==="mcp_tool_result").map(r=>JSON.stringify(r))].join(" ");
    let ticketKey=null,ticketUrl=null;
    try{const m=txt.match(/\{[^}]*"key"\s*:\s*"(AEM-\d+)"[^}]*\}/);if(m){const p=JSON.parse(m[0]);ticketKey=p.key;ticketUrl=p.url;}}catch(e){}
    if(!ticketKey){const m=all.match(/AEM-\d+/);if(m){ticketKey=m[0];ticketUrl="https://veeam.atlassian.net/browse/"+ticketKey;}}
    setFB(idx,{submitting:false,submitted:true,ticketKey,ticketUrl});
  }catch(e){setFB(idx,{submitting:false,submitted:true,ticketKey:null,ticketUrl:null});}
  renderMessages();
}

function setFB(idx,patch){feedback[idx]={...(feedback[idx]||{}),...patch};}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

function renderFeedback(i){
  const fb=feedback[i]||{};
  if(fb.submitted){
    const lnk=fb.ticketKey&&fb.ticketUrl?'<a class="ticket-link" href="'+esc(fb.ticketUrl)+'" target="_blank" rel="noopener">'+esc(fb.ticketKey)+' &#8599;</a>':"";
    return '<div class="feedback-area"><div class="submitted-msg">&#10003; Feedback logged in Jira &mdash; thanks for helping us improve. '+lnk+'</div></div>';
  }
  let h='<div class="feedback-area"><div class="feedback-row"><span class="fb-label">Helpful?</span>'
    +'<button class="fb-btn'+(fb.vote==="up"?" up-active":"")+'" onclick="giveFeedback('+i+',&quot;up&quot;)">&#128077;</button>'
    +'<button class="fb-btn'+(fb.vote==="down"?" down-active":"")+'" onclick="giveFeedback('+i+',&quot;down&quot;)">&#128078;</button>'
    +(fb.vote==="up"?'<span class="thanks">Thanks!</span>':"")
    +'</div>';
  if(fb.vote==="down"){
    const chips=FEEDBACK_REASONS.map(r=>'<button class="reason-chip'+(fb.reason===r?" selected":"")+'" onclick="selectReason('+i+',this.dataset.r)" data-r="'+esc(r)+'">'+esc(r)+'</button>').join("");
    h+='<div class="reason-area"><div class="reason-label">What was the issue?</div><div class="reason-chips">'+chips+'</div>'
      +'<button class="submit-fb-btn'+(fb.reason&&!fb.submitting?" ready":"")+ '" onclick="doSubmit('+i+')" '+((!fb.reason||fb.submitting)?"disabled":"")+'>'+(fb.submitting?"Submitting&hellip;":"Submit feedback &rarr;")+'</button></div>';
  }
  return h+'</div>';
}

function renderMessages(){
  const cont=document.getElementById("messages");
  const lr=document.getElementById("loading-row");
  cont.querySelectorAll(".msg-row").forEach(el=>el.remove());
  messages.forEach((msg,i)=>{
    const div=document.createElement("div");
    div.className="msg-row "+msg.role;
    if(msg.role==="user"){
      div.innerHTML='<div class="avatar-user">YOU</div><div class="bubble user">'+esc(msg.content)+'</div>';
    }else{
      div.innerHTML=latticeAvatar()+'<div class="bubble agent">'+esc(msg.content)+renderFeedback(i)+'</div>';
    }
    cont.insertBefore(div,lr);
  });
  lr.style.display=loading?"flex":"none";
  cont.scrollTop=cont.scrollHeight;
  const fc=document.getElementById("followup-chips");
  if(messages.length>=2&&!loading){
    const asked=new Set(messages.map(m=>m.content));
    const chips=SUGGESTED_QUESTIONS.filter(s=>!asked.has(s.q)).slice(0,4);
    fc.style.display=chips.length?"flex":"none";
    fc.innerHTML=chips.map(s=>'<button class="fup-chip" onclick="send('+JSON.stringify(s.q)+')">'+esc(s.label)+' &#8599;</button>').join("");
  }else{fc.style.display="none";}
}

function updateUI(){
  const has=messages.length>0;
  document.getElementById("chat-area").style.display=has?"block":"none";
  document.getElementById("reset-btn").style.display=has?"block":"none";
  document.getElementById("suggestions").style.display=has?"none":"block";
  renderMessages();
}

async function send(text){
  const q=typeof text==="string"?text:document.getElementById("input").value.trim();
  if(!q||loading)return;
  document.getElementById("input").value="";
  updateSendBtn();
  messages.push({role:"user",content:q});
  loading=true;updateUI();
  try{const r=await askClaude(messages);messages.push({role:"assistant",content:r});}
  catch(e){messages.push({role:"assistant",content:"Something went wrong. Please try again."});}
  loading=false;updateUI();
  document.getElementById("input").focus();
}

function reset(){messages=[];feedback={};loading=false;document.getElementById("input").value="";updateUI();}
function giveFeedback(idx,vote){feedback[idx]={vote,reason:null,submitted:false,submitting:false};renderMessages();}
function selectReason(idx,reason){setFB(idx,{reason:reason});renderMessages();}
function doSubmit(idx){submitFeedback(idx);}
function updateSendBtn(){
  const v=document.getElementById("input").value.trim();
  document.getElementById("send-btn").classList.toggle("ready",!!(v&&!loading));
}

const grid=document.getElementById("sq-grid");
SUGGESTED_QUESTIONS.forEach(({label,q})=>{
  const btn=document.createElement("button");
  btn.className="sq-btn";btn.textContent=label;btn.onclick=()=>send(q);grid.appendChild(btn);
});

const inp=document.getElementById("input");
inp.addEventListener("input",updateSendBtn);
inp.addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey)send();});
inp.addEventListener("focus",()=>document.getElementById("input-bar").classList.add("focused"));
inp.addEventListener("blur",()=>document.getElementById("input-bar").classList.remove("focused"));
document.getElementById("send-btn").addEventListener("click",send);
document.getElementById("reset-btn").addEventListener("click",reset);
updateUI();
</script>
</body>
